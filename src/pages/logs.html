<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BFS Logs</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      margin: 0;
      padding: 20px;
      line-height: 1.5;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      color: #00d9ff;
      border-bottom: 2px solid #00d9ff;
      padding-bottom: 10px;
    }
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    button {
      background: #00d9ff;
      color: #000;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #00b8d4; }
    button:disabled { background: #555; cursor: not-allowed; }
    .stats {
      background: #16213e;
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
    }
    .stat {
      text-align: center;
    }
    .stat-value {
      font-size: 2em;
      font-weight: bold;
      color: #00d9ff;
    }
    .stat-label {
      font-size: 0.85em;
      color: #888;
    }
    #logs {
      background: #0f0f23;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 15px;
      max-height: 70vh;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 13px;
    }
    .log-entry {
      padding: 5px 0;
      border-bottom: 1px solid #222;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-id { color: #666; margin-right: 10px; }
    .log-timestamp { color: #888; margin-right: 10px; }
    .log-session { color: #00d9ff; margin-right: 10px; }
    .log-level {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.75em;
      font-weight: bold;
      margin-right: 10px;
    }
    .log-level.debug { background: #1e5631; color: #96d67d; }
    .log-level.info { background: #1e4f89; color: #66b3ff; }
    .log-level.warn { background: #894f1e; color: #ffdd66; }
    .log-level.error { background: #891e1e; color: #ff6666; }
    .log-message { color: #eee; }
    .log-data {
      color: #aaa;
      font-size: 0.85em;
      margin-top: 5px;
      word-break: break-all;
    }
    .empty {
      text-align: center;
      color: #666;
      padding: 40px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 BlackFlagStream Debug Logs</h1>
    
    <div class="controls">
      <button id="btnRefresh" onclick="refreshLogs()">🔄 Refresh</button>
      <button id="btnClear" onclick="clearLogs()">🗑️ Clear Logs</button>
      <button id="btnDownload" onclick="downloadLogs()">⬇️ Download</button>
    </div>
    
    <div class="stats" id="stats">
      <div class="stat">
        <div class="stat-value" id="logCount">-</div>
        <div class="stat-label">Total Logs</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="lastUpdate">-</div>
        <div class="stat-label">Last Update</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="logSize">-</div>
        <div class="stat-label">Size</div>
      </div>
    </div>
    
    <div id="logs">
      <div class="empty">Loading logs...</div>
    </div>
  </div>

  <script>
    const API_URL = '/api/logs';
    const LOGS_URL = '/logs.txt';
    const adminSession = localStorage.getItem('bfs_admin_session');
    const authOptions = adminSession ? { headers: { 'X-Admin-Session': adminSession } } : {};

    function logToScreen(entry) {
      const logsDiv = document.getElementById('logs');
      const div = document.createElement('div');
      div.className = 'log-entry';
      
      const levelClass = `log-level ${entry.level}`;
      const dataHtml = entry.data ? `<div class="log-data">${escapeHtml(JSON.stringify(entry.data))}</div>` : '';
      
      div.innerHTML = `
        <span class="log-id">[${entry.id}]</span>
        <span class="log-timestamp">${entry.timestamp}</span>
        <span class="log-session">${escapeHtml(entry.session || 'unknown')}</span>
        <span class="${levelClass}">${entry.level.toUpperCase()}</span>
        <span class="log-message">${escapeHtml(entry.message)}</span>
        ${dataHtml}
      `;
      
      logsDiv.insertBefore(div, logsDiv.firstChild);
      
      // Auto-scroll to top
      logsDiv.scrollTop = 0;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function refreshLogs() {
      document.getElementById('logs').innerHTML = '<div class="empty">Loading...</div>';
      
      fetch(API_URL, authOptions)
        .then(res => res.text())
        .then(content => {
          if (!content || !content.trim()) {
            document.getElementById('logs').innerHTML = '<div class="empty">No logs available yet</div>';
          } else {
            const lines = content.trim().split('\n');
            lines.forEach(line => {
              try {
                const entry = JSON.parse(line);
                logToScreen(entry);
              } catch (e) {
                // Skip invalid lines
              }
            });
          }
          updateStats(content);
        })
        .catch(err => {
          document.getElementById('logs').innerHTML = `<div class="empty">Error loading logs: ${escapeHtml(err.message)}</div>`;
          console.error('Failed to load logs:', err);
        });
    }

    function updateStats(content) {
      const count = content ? content.split('\n').length : 0;
      document.getElementById('logCount').textContent = count.toLocaleString();
      
      const lastLine = content ? content.split('\n').pop() : null;
      const lastUpdate = lastLine ? new Date(lastLine.timestamp).toLocaleTimeString() : '-';
      document.getElementById('lastUpdate').textContent = lastUpdate;
      
      const size = content ? new Blob([content]).size.toLocaleString() + ' bytes' : '-';
      document.getElementById('logSize').textContent = size;
    }

    function clearLogs() {
      if (!confirm('Are you sure you want to clear all logs? This cannot be undone.')) return;
      
      fetch(`${API_URL}?clear=true`, { method: 'POST', ...authOptions })
        .then(res => res.text())
        .then(() => {
          document.getElementById('logs').innerHTML = '<div class="empty">Logs cleared</div>';
          updateStats('');
        });
    }

    function downloadLogs() {
      fetch(API_URL, authOptions)
        .then(res => res.text())
        .then(content => {
          if (!content) {
            alert('No logs to download');
            return;
          }
          
          const blob = new Blob([content], { type: 'text/plain' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `bfs-logs-${new Date().toISOString().slice(0,10)}.txt`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        });
    }

    // Auto-refresh every 5 seconds
    setInterval(refreshLogs, 5000);
    
    // Initial load
    refreshLogs();
  </script>
</body>
</html>
