name = "blackflagstream"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build"
directory = "dist"

[functions]
directory = "functions"

[vars]
NODE_ENV = "production"
VITE_DEBUG_LOGGING = "true"

[[routes]]
pattern = "blackflagstreams.link/*"

[[routes]]
pattern = "beta.blackflagstreams.link/*"
